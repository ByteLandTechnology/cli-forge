name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    runs-on: macos-14
    env:
      DESTINATION_REPOSITORY_TOKEN: ${{ secrets.DESTINATION_REPOSITORY_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify repo-native release configuration
        id: verify_release_config
        run: node scripts/release/verify-release-config.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ steps.verify_release_config.outputs.all_targets }}

      - uses: Swatinem/rust-cache@v2

      - uses: ./.github/actions/setup-build-env

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Quality gates
        run: npm run release:quality-gates

      - name: Build configured release artifacts
        run: npm run release:build-all

      - name: Release
        run: npm run release:ci
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: Fail workflow when release receipt is missing
        if: ${{ always() && hashFiles('.work/release/last-publication-receipt.json') == '' }}
        run: |
          echo "Expected .work/release/last-publication-receipt.json after release flow."
          exit 1

      - name: Upload release evidence bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            ${{ steps.verify_release_config.outputs.github_release_assets_dir }}
            .work/release/last-publication-receipt.json
            .release-manifest.json
